services:
    iqdb-labeler:
        build: .
        ports:
            - "4100:4100"
        env_file: .env
        volumes:
            - ./models:/app/models:ro
            - ./danbooru-data:/app/danbooru-data:ro
            - ./cursor.txt:/app/cursor.txt
            - db:/app/database
        restart: unless-stopped
        environment:
            - DB_PATH=/app/database/labels.db

volumes:
    db:
